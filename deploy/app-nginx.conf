server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Account API lives in the admin app; proxying keeps the session cookie
    # first-party for this origin. The variable + resolver make nginx re-resolve
    # the container name instead of pinning its IP at startup.
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $admin_upstream http://ob-cn-admin:3000;
        proxy_pass $admin_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
