name: ob-cn

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: openbible
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ob_cn
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openbible -d ob_cn"]
      interval: 5s
      timeout: 3s
      retries: 20

  admin:
    build: ./admin-app
    container_name: ob-cn-admin
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://openbible:${DB_PASSWORD}@db:5432/ob_cn?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      APP_URL: https://admin.openbible.live
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      GOOGLE_WEB_CLIENT_ID: ${GOOGLE_WEB_CLIENT_ID:-1036636088293-gihlhd5hlur5m8btmrr077efq69v95o0.apps.googleusercontent.com}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_IOS_CLIENT_ID: ${APPLE_IOS_CLIENT_ID:-live.openbible.app}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APPLE_KEY_ID: ${APPLE_KEY_ID:-}
      APPLE_PRIVATE_KEY_PATH: /run/secrets/apple_sign_in_key
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY:-}
      OPENBIBLE_LLM_BASE_URL: ${OPENBIBLE_LLM_BASE_URL:-http://host.docker.internal:8010/v1}
      OPENBIBLE_LLM_MODEL: ${OPENBIBLE_LLM_MODEL:-Qwen3-14B-AWQ}
      VLLM_API_KEY: ${VLLM_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:172.20.0.1"
    volumes:
      - ./secrets/apple_sign_in_key.p8:/run/secrets/apple_sign_in_key:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - caddy

  app:
    image: nginx:alpine
    container_name: ob-cn-app
    restart: unless-stopped
    volumes:
      - ./app-dist:/usr/share/nginx/html:ro
      - ./data:/usr/share/nginx/html/data:ro
      - ./app-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - caddy

networks:
  default:
  caddy:
    name: ko-tts_ko-tts-net
    external: true

volumes:
  db_data:
